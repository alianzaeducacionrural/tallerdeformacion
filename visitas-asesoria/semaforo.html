<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Semáforo · Visitas Escuela Nueva</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230F7A63'/%3E%3Cpath d='M16 22h26v14a13 13 0 0 1-13 13h0a13 13 0 0 1-13-13V22Z' fill='none' stroke='%23fff' stroke-width='4'/%3E%3Cpath d='M42 26h6a6 6 0 0 1 0 12h-6' fill='none' stroke='%23fff' stroke-width='4'/%3E%3Cpath d='M23 9c-2 3 2 5 0 8M32 9c-2 3 2 5 0 8' fill='none' stroke='%23E8C766' stroke-width='3' stroke-linecap='round'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
  .kpi{background:var(--surf);border:1px solid var(--line);border-radius:16px;padding:15px 18px;display:flex;gap:13px;align-items:center;box-shadow:0 2px 10px rgba(16,60,50,.04)}
  .kpi .ic{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-size:1.2rem;background:color-mix(in srgb,var(--ac) 15%,#fff);color:var(--ac)}
  .kpi .num{font-size:1.7rem;font-weight:800;line-height:1;color:var(--ink)}
  .kpi .lab{font-size:.76rem;font-weight:700;color:var(--ink2);margin-top:3px}
  .sedes{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
  .sede{background:var(--surf);border:1px solid var(--line);border-left:5px solid var(--c);border-radius:16px;padding:16px 18px;cursor:pointer;
    transition:.15s;box-shadow:0 2px 10px rgba(16,60,50,.04)}
  .sede:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(16,60,50,.12)}
  .sede .muni{font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink3)}
  .sede .nom{font-weight:800;font-size:1.05rem;color:var(--ink);margin:2px 0 2px}
  .sede .inst{font-size:.86rem;color:var(--ink2)}
  .sede .row{display:flex;align-items:center;justify-content:space-between;margin-top:12px;gap:8px}
  .sede .asesor{font-size:.78rem;color:var(--ink3)}
  /* modal detalle */
  .grp{margin-bottom:16px}
  .grp h4{font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;display:flex;align-items:center;gap:7px}
  .grp.g-verde h4{color:#0c7a52}.grp.g-amar h4{color:#8a6a00}.grp.g-rojo h4{color:#a8322b}
  .grp ul{list-style:none;display:flex;flex-direction:column;gap:6px}
  .grp li{font-size:.88rem;color:var(--ink);background:var(--surf2);border-radius:10px;padding:8px 12px}
  .reco{background:#fff8e8;border:1px solid #f1e2b8;border-radius:12px;padding:13px 15px;font-size:.9rem;color:var(--ink);line-height:1.5}
  .reco .k{display:block;font-weight:800;color:var(--gold2);font-size:.74rem;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
  .scorebar{display:flex;align-items:center;gap:12px;margin-bottom:18px}
  .scorebar .val{font-size:2rem;font-weight:800;color:var(--emerald-d)}
  @media(max-width:860px){.kpis{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
  <div class="topbar">
    <div class="inner">
      <div>
        <div class="kicker">Asesoría y Acompañamiento · Escuela Nueva</div>
        <h1>Semáforo de Sedes</h1>
      </div>
      <nav class="nav">
        <a href="index.html">📝 Visita</a>
        <a href="semaforo.html" class="active">🚦 Semáforo</a>
        <a href="compromisos.html">✅ Compromisos</a>
      </nav>
    </div>
  </div>

  <div class="wrap">
    <div id="loading" class="loading"><div class="spin"></div>Cargando sedes…</div>
    <div id="dash" style="display:none">
      <div class="kpis" id="kpis"></div>
      <div class="filters">
        <div class="f"><label>Municipio</label><select id="fMun"><option value="">Todos</option></select></div>
        <div class="f"><label>Institución</label><select id="fInst"><option value="">Todas</option></select></div>
        <div class="f"><label>Calificación</label><select id="fCal">
          <option value="">Todas</option><option value="VERDE">🟢 Verde</option>
          <option value="AMARILLO">🟡 Amarillo</option><option value="ROJO">🔴 Rojo</option></select></div>
        <button class="btn ghost" id="clearF" type="button" style="align-self:center">✕ Limpiar filtros</button>
        <span class="count-pill" id="count"></span>
      </div>
      <div class="sedes" id="sedes"></div>
    </div>
  </div>

  <div class="modal" id="modal"><div class="box">
    <div class="mhead"><button class="x" id="mClose">&times;</button>
      <h3 id="mTit"></h3><div class="msub" id="mSub"></div></div>
    <div class="mbody" id="mBody"></div>
  </div></div>

  <script src="config.js"></script>
  <script src="semaforo.js"></script>
</body>
</html>
