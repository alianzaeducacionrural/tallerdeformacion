<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visitas Escuela Nueva · Formulario de visita</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230F7A63'/%3E%3Cpath d='M16 22h26v14a13 13 0 0 1-13 13h0a13 13 0 0 1-13-13V22Z' fill='none' stroke='%23fff' stroke-width='4'/%3E%3Cpath d='M42 26h6a6 6 0 0 1 0 12h-6' fill='none' stroke='%23fff' stroke-width='4'/%3E%3Cpath d='M23 9c-2 3 2 5 0 8M32 9c-2 3 2 5 0 8' fill='none' stroke='%23E8C766' stroke-width='3' stroke-linecap='round'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .seccion{margin-bottom:22px}
  .bloque-tit{font-family:'Playfair Display',Georgia,serif;font-size:1.3rem;color:var(--emerald-d);margin-bottom:14px}
  .seccion .sec-tit{font-size:.82rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--gold2);margin-bottom:8px}
  .ind{border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:10px;background:#fff}
  .ind .ind-t{font-weight:600;font-size:.95rem;margin-bottom:10px;color:var(--ink)}
  .opts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .opts input{position:absolute;opacity:0;pointer-events:none}
  .opts label{display:flex;align-items:center;justify-content:center;text-align:center;border:1.6px solid var(--line);border-radius:11px;
    padding:12px 8px;cursor:pointer;font-size:clamp(.6rem,1.5vw,.82rem);font-weight:600;transition:.15s;background:#fff;user-select:none;white-space:nowrap}
  .opts label:hover{border-color:var(--g4)}
  .opts .o-aa input:checked + label{background:var(--verde);color:#fff;border-color:transparent}
  .opts .o-am input:checked + label{background:var(--amarillo);color:#fff;border-color:transparent}
  .opts .o-na input:checked + label{background:var(--rojo);color:#fff;border-color:transparent}
  @media(max-width:560px){
    .bloque-tit{font-size:1.15rem}
    .opts{grid-template-columns:1fr;gap:7px}
    .opts label{font-size:.92rem;justify-content:flex-start;padding:13px 16px;white-space:normal}
    .ind{padding:13px 14px}
  }
  .compromiso{border:1px dashed var(--line);border-radius:14px;padding:16px;margin-bottom:12px;background:#fbfdfe}
  .compromiso .ch{font-weight:800;color:var(--emerald-d);font-size:.9rem;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .opc{font-size:.72rem;font-weight:700;color:var(--ink3);background:var(--surf2);border-radius:999px;padding:2px 9px}
  .err{color:var(--rojo);font-size:.88rem;font-weight:600;margin-top:6px}
  /* ---- Modal: resumen / estados ---- */
  .mfoot{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
  .mfoot.center{justify-content:center}
  .ck{width:74px;height:74px;border-radius:50%;background:linear-gradient(135deg,var(--emerald),var(--aqua));
    margin:0 auto 16px;display:grid;place-items:center;box-shadow:0 14px 30px rgba(15,122,99,.30)}
  .mtit{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--emerald-d);text-align:center;margin-bottom:6px}
  .mtxt{color:var(--ink2);text-align:center;max-width:42ch;margin:0 auto 18px;line-height:1.5;font-size:.92rem}
  .sum-sec{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--gold2);margin:16px 0 8px}
  .sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px}
  .sum-grid .k{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink3)}
  .sum-grid .v{font-size:.95rem;color:var(--ink);font-weight:600;margin-top:1px}
  .sum-grid .full{grid-column:1/-1}
  .vchips{display:flex;gap:8px;flex-wrap:wrap}
  .vchip{border-radius:999px;padding:5px 13px;font-size:.82rem;font-weight:700}
  .vchip.verde{background:rgba(23,166,115,.14);color:#0c7a52}
  .vchip.amarillo{background:rgba(217,148,0,.16);color:#8a6a00}
  .vchip.rojo{background:rgba(214,68,60,.14);color:#a8322b}
  .err-box{background:#fff5f3;border:1px solid #f3cfc9;border-radius:12px;padding:14px 16px;color:#a8322b;font-size:.92rem;line-height:1.5}
  .mload{text-align:center;padding:48px 24px}
  .mload p{color:var(--ink2);font-weight:600;margin-top:6px}
</style>
</head>
<body>
  <div class="topbar">
    <div class="inner">
      <div>
        <div class="kicker">Asesoría y Acompañamiento · Escuela Nueva</div>
        <h1>Registro de Visita</h1>
      </div>
      <nav class="nav">
        <a href="index.html" class="active">📝 Visita</a>
        <a href="semaforo.html">🚦 Semáforo</a>
        <a href="compromisos.html">✅ Compromisos</a>
      </nav>
    </div>
  </div>

  <div class="wrap wrap-narrow">
    <form id="form" class="card" style="padding:clamp(18px,4vw,28px)">

      <div class="seccion">
        <div class="grid2">
          <div class="fld"><label>Asesor <span class="req">*</span></label><input id="asesor" required></div>
          <div class="fld"><label>Fecha de visita <span class="req">*</span></label><input id="fecha_visita" type="date" required></div>
        </div>
        <div class="grid3">
          <div class="fld"><label>Municipio <span class="req">*</span></label><input id="municipio" required></div>
          <div class="fld"><label>Institución <span class="req">*</span></label><input id="institucion" required></div>
          <div class="fld"><label>Sede <span class="req">*</span></label><input id="sede" required></div>
        </div>
      </div>

      <div class="seccion">
        <h2 class="bloque-tit">Valoración de los Indicadores</h2>
        <div class="sec-tit">Gobierno Estudiantil</div>
        <div id="secA"></div>
        <div class="sec-tit" style="margin-top:18px">Guías de Interaprendizaje</div>
        <div id="secB"></div>
      </div>

      <div class="seccion">
        <div class="fld"><label>Recomendaciones</label><textarea id="recomendaciones" rows="3" placeholder="Observaciones y recomendaciones de la visita (opcional)…"></textarea></div>
      </div>

      <div class="seccion">
        <div class="sec-tit">Compromisos de mejoramiento</div>
        <div id="compromisos"></div>
      </div>

      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-top:8px">
        <button type="submit" class="btn primary" id="btn">Registrar visita</button>
        <span class="err" id="err"></span>
      </div>
    </form>

  </div>

  <!-- Modal: confirmación / cargando / resumen-éxito / error -->
  <div class="modal" id="modal"><div class="box" id="modalBox"></div></div>

  <div class="toast" id="toast"></div>

  <script src="config.js"></script>
  <script src="formulario.js"></script>
</body>
</html>
